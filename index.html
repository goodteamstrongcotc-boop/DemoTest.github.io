<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camspine Record</title>
<style>
body {
  background: linear-gradient(to bottom, #f5f1e8, #eae3d5);
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
}

/* Header */
header {
  padding: 60px 20px;
  text-align: center;
  background: linear-gradient(180deg,#000,#111);
}
header h1 {
  margin:0;
  font-size:42px;
  color:#f5c542;
}
header p {
  opacity:0.8;
  margin-bottom:20px;
}
header .btn {
  margin:5px;
}

/* Section */
section {
  padding:60px 20px;
  text-align:center;
  opacity:0;
  transform:translateY(40px);
  transition:all 0.8s ease;
}
section.show {
  opacity:1;
  transform:translateY(0);
}

/* Menu Cards */
.menu {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}
.card {
  background:#ffffff; /* 改成白色卡片 */
  padding:20px;
  border-radius:16px;
  width:220px;
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}
.card img {
  width:100%;
  border-radius:10px;
}

/* Buttons */
button, .btn {
  padding:15px 25px;
  background:#f5c542;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  margin:10px;
  display:inline-block;
  text-decoration:none;
  color:#000;
}
.btn-telegram {
  background:#0088cc;
  color:#fff;
}

/* Map + Telegram Container */
.map-telegram {
  display:flex;
  flex-direction: column; /* 先垂直排 */
  align-items:center;
  gap:20px;
  margin-top:20px;
}
@media(min-width:700px){
  .map-telegram {
    flex-direction: row; /* 大螢幕橫排 */
    justify-content:center;
  }
}
.map {
  width:300px;
  height:300px;
  border:0;
  border-radius:12px;
}

/* Footer */
footer {
  padding:30px;
  text-align:center;
  background:#000;
  color:#fff;
  opacity:0.8;
}
</style>
</head>
<body>

<header>
  <h1>Camspine Record</h1>
  <p>Premium Music Production & AI Sound Design</p>
  <a href="tel:+85512345678" class="btn">📞 Call Now</a>
  <a href="https://t.me/yourusername" class="btn btn-telegram">💬 Telegram</a>
</header>

<section>
  <h2>Signature Music</h2>
  <div class="menu">
    <div class="card">
      <img src="images/cover1.jpg" alt="Track">
      <h3>Track 1</h3>
      <p>Lo-fi Chill</p>
    </div>
    <div class="card">
      <img src="images/cover2.jpg" alt="Track">
      <h3>Track 2</h3>
      <p>Ambient Piano</p>
    </div>
  </div>
</section>

<section>
  <h2>Visit & Contact</h2>
  <p>Street 123, Phnom Penh</p>
  <p>Open Daily: 8AM - 10PM</p>

  <div class="map-telegram">
    <!-- Google Map -->
    <iframe 
      src="https://www.google.com/maps/embed?..." 
      class="map"
      allowfullscreen="" 
      loading="lazy">
    </iframe>

    <!-- Telegram Button -->
    <a href="https://t.me/yourusername" class="btn btn-telegram">💬 Telegram</a>
  </div>
</section>

<footer>
  <p>© 2026 Camspine Record | All Rights Reserved</p>
</footer>

<script>
// 滑動動畫
window.addEventListener("scroll", function() {
  document.querySelectorAll("section").forEach(function(sec) {
    var top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add("show");
    }
  });
});
</script>

</body>
</html>
