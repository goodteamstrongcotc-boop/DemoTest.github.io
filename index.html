<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourRestaurantName</title>
<style>
body {
  background: linear-gradient(to bottom, #f5f1e8, #eae3d5);
  font-family: Arial, sans-serif;
}
header {padding:60px 20px; text-align:center; background:linear-gradient(180deg,#000,#111);}
header h1 {margin:0; font-size:42px; color:#f5c542;}
header p {opacity:0.8;}
section {padding:60px 20px; text-align:center; opacity:0; transform:translateY(40px); transition:all 0.8s ease;}
section.show {opacity:1; transform:translateY(0);} 
.menu {display:flex; flex-wrap:wrap; justify-content:center; gap:20px;}
.card {background:#1a1a1a; padding:20px; border-radius:15px; width:220px; box-shadow:0 10px 20px rgba(0,0,0,0.5);} 
.card img {width:100%; border-radius:10px;}
button, .btn {padding:15px 25px; background:#f5c542; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin:10px; display:inline-block; text-decoration:none; color:#000;}
.btn-telegram {background:#0088cc; color:#fff;}
.map {width:100%; height:300px; border:0; margin-top:20px; border-radius:10px;}
footer {padding:30px; text-align:center; background:#000; opacity:0.7;}
</style>
</head>
<body>

<!-- 背景音樂 -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", function() {
  var music = document.getElementById("bgMusic");
  music.muted = false;
  music.play();
});

// 滑動動畫
window.addEventListener("scroll", function() {
  document.querySelectorAll("section").forEach(function(sec) {
    var top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add("show");
    }
  });
});
</script>

<header>
<h1>Your Restaurant Name</h1>
<p>Premium Dining Experience in Phnom Penh</p>
<a href="tel:+85512345678" class="btn">📞 Call Now</a>
<a href="https://t.me/yourusername" class="btn btn-telegram">💬 Telegram</a>
</header>

<section>
<h2>Signature Menu</h2>
<div class="menu">
<div class="card">
<img src="images/steak.jpg" alt="Food">
<h3>Grilled Steak</h3>
<p>$12.99</p>
</div>
<div class="card">
<img src="images/pasta.jpg" alt="Food">
<h3>Seafood Pasta</h3>
<p>$9.99</p>
</div>
<div class="card">
<img src="images/coffee.jpg" alt="Food">
<h3>Signature Coffee</h3>
<p>$3.50</p>
</div>
</div>
</section>

<section>
<h2>Visit Us</h2>
<p>Street 123, Phnom Penh</p>
<p>Open Daily: 8AM - 10PM</p>
<a href="tel:+85512345678" class="btn">📞 Call</a>
<a href="https://t.me/yourusername" class="btn btn-telegram">💬 Telegram</a>

<!-- Google Map -->
<iframe 
  src="https://www.google.com/maps/embed?..." 
  width="300" 
  height="300" 
  style="border:0; border-radius:12px;"
  allowfullscreen="" 
  loading="lazy">
</iframe>

</section>

<footer>
<p>© 2026 Your Restaurant Name | All Rights Reserved</p>
</footer>

</body>
</html>
