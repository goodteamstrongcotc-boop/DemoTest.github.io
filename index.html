<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Restaurant</title>
<style>
/* 🍽️ 配色趨勢：溫暖大地系 */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4efe6; /* 溫和米膚背景 */
  color: #3e3a36;      /* 深色主文字 */
}

/* Header */
header {
  text-align: center;
  padding: 50px 20px;
  background: #c06b34; /* 溫暖橙棕主色 */
  color: #fff;
}
header h1 {
  font-size: 42px;
  margin: 0;
}
header p {
  opacity: 0.9;
  margin-top: 10px;
}
header .btn {
  background: #a3835f; /* 深奶咖按鈕 */
  margin: 8px;
  color: #fff;
}

/* Section */
section {
  padding: 50px 20px;
  text-align: center;
}

/* 卡片 */
.menu {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}
.card {
  background: #ffffff;
  border-radius: 16px;
  padding: 20px;
  width: 240px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.12);
}
.card img {
  width: 100%;
  border-radius: 12px;
}

/* 按鈕 */
.btn {
  padding: 14px 24px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  display: inline-block;
}

/* 電話按鈕 */
.btn.call {
  background: #8a6e4f;
  color: #fff;
}

/* Telegram 按鈕 */
.btn.telegram {
  background: #0088cc;
  color: #fff;
}

/* Map + CTA 容器 */
.map-telegram {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  margin-top: 20px;
}
@media(min-width: 700px) {
  .map-telegram {
    flex-direction: row;
    justify-content: center;
  }
}
.map {
  width: 300px;
  height: 300px;
  border-radius: 12px;
}

/* Footer */
footer {
  text-align: center;
  padding: 30px;
  font-size: 14px;
  opacity: 0.85;
}
</style>
</head>
<body>

<header>
  <h1>Your Restaurant</h1>
  <p>Delicious Dining Experience in Phnom Penh</p>
  <a href="tel:+85512345678" class="btn call">📞 Call Now</a>
  <a href="https://t.me/yourusername" class="btn telegram">💬 Telegram</a>
</header>

<section>
  <h2>Our Menu</h2>
  <div class="menu">
    <div class="card">
      <img src="images/steak.jpg" alt="Steak">
      <h3>Grilled Steak</h3>
      <p>$12.99</p>
    </div>
    <div class="card">
      <img src="images/pasta.jpg" alt="Pasta">
      <h3>Seafood Pasta</h3>
      <p>$9.99</p>
    </div>
    <div class="card">
      <img src="images/coffee.jpg" alt="Coffee">
      <h3>Signature Coffee</h3>
      <p>$3.50</p>
    </div>
  </div>
</section>

<section>
  <h2>Visit Us</h2>
  <p>Street 123, Phnom Penh</p>

  <div class="map-telegram">
    <iframe 
      src="https://www.google.com/maps/embed?..."
      class="map"
      loading="lazy"></iframe>

    <a href="https://t.me/yourusername" class="btn telegram">💬 Telegram</a>
  </div>
</section>

<footer>© 2026 Your Restaurant | All Rights Reserved</footer>
</body>
</html>
