<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Restaurant</title>
<style>
/* 🌿 整體配色: 大地色系 + 高端咖啡廳 */
body {
  margin: 0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background: #f4efe6; /* 溫暖米膚色 */
  color: #3e3a36; /* 深色文字 */
}

/* Header */
header {
  text-align: center;
  padding: 60px 20px;
  background: linear-gradient(135deg, #c06b34, #8a6e4f); /* 溫暖橙棕 + 深奶咖漸層 */
  color: #fff;
}
header h1 {
  font-size: 48px;
  margin: 0;
  letter-spacing: 1px;
}
header p {
  margin-top: 10px;
  font-size: 18px;
  opacity: 0.9;
}
header .btn {
  margin: 10px 5px;
  font-weight: bold;
  text-decoration: none;
  border-radius: 8px;
  padding: 14px 28px;
  display: inline-block;
}

/* 按鈕顏色 */
.btn.call { background: #a3835f; color: #fff; }
.btn.telegram { background: #0088cc; color: #fff; }

/* Section */
section {
  padding: 60px 20px;
  text-align: center;
}

/* Menu Cards */
.menu {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 24px;
}
.card {
  background: #ffffff;
  border-radius: 16px;
  padding: 20px;
  width: 240px;
  box-shadow: 0 8px 22px rgba(0,0,0,0.1);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 28px rgba(0,0,0,0.15);
}
.card img {
  width: 100%;
  border-radius: 12px;
}

/* Map + 按鈕容器 */
.map-telegram {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}
.map {
  width: 320px;
  height: 320px;
  border-radius: 12px;
  border:0;
}

/* 按鈕並排容器 */
.button-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}
.button-row .btn {
  min-width: 140px;
}

/* Footer */
footer {
  text-align: center;
  padding: 30px;
  font-size: 14px;
  opacity: 0.85;
}
</style>
</head>
<body>

<header>
  <h1>Your Restaurant</h1>
  <p>精緻現代高端咖啡廳 | Premium Cafe Experience</p>
</header>

<section>
  <h2>Our Menu</h2>
  <div class="menu">
    <div class="card">
      <img src="images/steak.jpg" alt="Grilled Steak">
      <h3>Grilled Steak</h3>
      <p>$12.99</p>
    </div>
    <div class="card">
      <img src="images/pasta.jpg" alt="Seafood Pasta">
      <h3>Seafood Pasta</h3>
      <p>$9.99</p>
    </div>
    <div class="card">
      <img src="images/coffee.jpg" alt="Signature Coffee">
      <h3>Signature Coffee</h3>
      <p>$3.50</p>
    </div>
  </div>
</section>

<section>
  <h2>Visit Us</h2>
  <p>Street 123, Phnom Penh</p>
  <p>Open Daily: 8AM - 10PM</p>

  <!-- 地圖 -->
  <div class="map-telegram">
    <iframe 
      src="https://www.google.com/maps/embed?..." 
      class="map" 
      allowfullscreen="" 
      loading="lazy">
    </iframe>
  </div>

  <!-- 並排按鈕 -->
  <div class="button-row">
    <a href="tel:+85512345678" class="btn call">📞 Call Now</a>
    <a href="https://t.me/yourusername" class="btn telegram">💬 Telegram</a>
  </div>
</section>

<footer>© 2026 Your Restaurant | All Rights Reserved</footer>

</body>
</html>
